name: 🚀 ThinkLab Manager - Continuous Integration & E2E Testing

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    name: 🏗️ Hardening Build & E2E Automation Loop
    runs-on: ubuntu-latest

    # Sobe o MongoDB oficial como um serviço efêmero em background para o Micronaut testar
    services:
      mongodb:
        image: mongo:6.0
        ports:
          - 27017:27017

    steps:
      # 1. Faz o checkout do código do repositório
      - name: 📂 Checkout Repository
        uses: actions/checkout@v4

      # 2. Configura o ambiente Java com a versão correta (JDK 21)
      - name: ☕ Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      # 3. CORREÇÃO CRÍTICA: Executa a compilação usando o Gradle global do ambiente do GitHub (remove o ./ do wrapper)
      - name: 🔨 Compile and Build ShadowJar
        run: gradle shadowJar --no-daemon -x test

      # 4. Inicializa a aplicação Micronaut em background usando a nomenclatura exata do rootProject
      - name: 🟢 Start Micronaut Microservice (Background)
        run: |
          java -jar build/libs/thinklabmanager-*-all.jar &
          echo "Aguardando inicialização da API na porta 8080..."
          sleep 15 # Tempo de segurança para o Netty/Micronaut subir o contexto reativo do Mongo
        env:
          MONGO_URI: "mongodb://localhost:27017/enterprise-infra-db"
          MICRONAUT_ENVIRONMENTS: test

      # 5. Configura o Node.js para instalar as ferramentas do Postman
      - name: 🟢 Setup Node.js v20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 6. Instala o Newman e o gerador de relatórios visuais HTML corporativos
      - name: 📦 Install Newman & Extra Reporter
        run: npm install -g newman newman-reporter-htmlextra

      # 7. Cria a pasta para isolar os relatórios gerados
      - name: 📁 Create Reports Directory
        run: mkdir -p reports

      # 8. EXECUÇÃO CRÍTICA: Newman roda a sua Collection automatizada testando os Enums e rotas
      - name: 🧪 Run Automated Postman/Newman E2E Loop
        run: |
          newman run ./PostMan-Collection/Bulk_Asset_Ingestion_Suite.json \
            -e ./PostMan-Collection/Dev.postman_environment.json \
            -r cli,htmlextra \
            --reporter-htmlextra-export ./reports/sre-ingestion-report.html \
            --bail

      # 9. Salva o relatório HTML gerado como um artefato do GitHub Actions
      - name: 📊 Upload SRE HTML Test Report
        uses: actions/upload-artifact@v4
        if: always() # Garante que o relatório suba mesmo se os testes falharem (ajuda a debugar)
        with:
          name: SRE-Ingestion-Report
          path: ./reports/sre-ingestion-report.html
          retention-days: 7