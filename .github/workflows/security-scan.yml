name: 🛡️ ThinkLab Manager - Security & CVE Scanner

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  security-audit:
    name: 🕵️ Image & Repository Vulnerability Scan
    runs-on: ubuntu-latest

    steps:
      # 1. Faz o checkout do código do repositório
      - name: 📂 Checkout Repository
        uses: actions/checkout@v4

      # 2. Analisa vulnerabilidades no próprio código-fonte e dependências do Gradle
      - name: 🔍 Scan Repository Dependencies (Trivy FS)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          exit-code: '0' # Não quebra o build aqui, apenas reporta no log do GitHub
          severity: 'CRITICAL,HIGH'

      # 3. Constrói a imagem localmente usando o Dockerfile corrigido (Java 21)
      - name: 🐳 Build Temporary Image for Scanning
        run: docker build -t thinklab-manager:scan .

      # 4. Escaneia a imagem gerada à procura de falhas críticas de infraestrutura
      - name: 🚨 Scan Container Image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'thinklab-manager:scan'
          format: 'table'
          exit-code: '1' # CRÍTICO: Se a imagem contiver falhas de nível CRITICAL, quebra o pipeline imediatamente!
          ignore-unfixed: true
          severity: 'CRITICAL'