name: 💎 ThinkLab Manager - Code Quality & Standards

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  quality-check:
    name: 🔍 Gradle Quality Check & Javadoc Validation
    runs-on: ubuntu-latest

    steps:
      # 1. Faz o checkout do código do repositório
      - name: 📂 Checkout Repository
        uses: actions/checkout@v4

      # 2. Configura o ambiente com a versão correta (JDK 21) alinhada ao projeto
      - name: ☕ Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      # 3. CORREÇÃO CRÍTICA: Executa a análise estática usando o Gradle nativo do ambiente (ignora o wrapper local)
      - name: 🧬 Run Static Code Analysis
        run: "gradle check --no-daemon -x test"