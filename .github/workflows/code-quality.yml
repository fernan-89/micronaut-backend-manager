name: 💎 ThinkLab Manager - Code Quality & Standards

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  quality-check:
    name: 🔍 Gradle Quality Check & Javadoc Validation
    runs-on: ubuntu-latest

    steps:
      - name: 📂 Checkout Repository
        uses: actions/checkout@v4

      - name: ☕ Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'gradle'

      - name: 🔓 Grant Execute Permission to Gradlew
        run: chmod +x gradlew

      # Roda a suite de checagem do Gradle (PMD, Checkstyle ou linters configurados no seu build.gradle)
      - name: 🧬 Run Static Code Analysis
        run: ./gradlew check --no-daemon -x test