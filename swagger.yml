openapi: 3.0.1
info:
  title: ThinkLab Manager API
  description: REST API for managing system users and related operations.
  contact:
    name: Development Team
    email: dev@thinklab.com
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  version: "0.1"
tags:
- name: Asset Management
  description: Operations related to corporate hardware asset lifecycle and inventory.
- name: Compute Resource Management
  description: Operations inventorying hardware and executing advanced lifecycle maintenance
    protocols.
- name: Maintenance Workflow
  description: "Operations related to corporate hardware repair tickets, diagnostics,\
    \ and lifecycle status logs."
- name: Software License Management
  description: "Operations managing corporate system keys, purchased software agreements,\
    \ quotas, and structural asset allocations."
- name: User Management
  description: Operations related to user management
paths:
  /assets:
    get:
      tags:
      - Asset Management
      summary: Search or list assets
      description: Retrieves a list of assets filtered optionally by physical asset
        tag or serial number.
      operationId: listOrSearchAssets
      parameters:
      - name: assetTag
        in: query
        description: Filter by exact corporate asset tag
        explode: false
        schema:
          type: string
          nullable: true
      - name: serialNumber
        in: query
        description: Filter by exact hardware serial number
        explode: false
        schema:
          type: string
          nullable: true
      responses:
        "200":
          description: Query executed successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AssetManagementResponse"
    post:
      tags:
      - Asset Management
      summary: Register a new asset
      description: Creates a new hardware asset and initializes its centralized audit
        trail.
      operationId: createAsset
      parameters:
      - name: X-Executor
        in: header
        description: Identifier of the entity executing the creation
        required: true
        schema:
          minLength: 1
          type: string
      requestBody:
        description: The validated JSON payload containing asset specifications.
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssetManagementRequest"
        required: true
      responses:
        "201":
          description: Asset successfully created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssetManagementResponse"
        "400":
          description: Invalid request payload
        "409":
          description: Asset tag or serial number already exists
  /assets/{assetHash}:
    get:
      tags:
      - Asset Management
      summary: Retrieve an asset
      description: Fetches the current specifications and lifecycle state of an asset
        by its hash.
      operationId: getAsset
      parameters:
      - name: assetHash
        in: path
        description: The unique business hash of the asset
        required: true
        schema:
          type: string
      responses:
        "200":
          description: Asset found and returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssetManagementResponse"
        "404":
          description: Asset not found
    put:
      tags:
      - Asset Management
      summary: Update an asset
      description: Performs a full or partial update on an asset and logs granular
        from/to changes in the audit trail.
      operationId: updateAsset
      parameters:
      - name: assetHash
        in: path
        description: The unique business hash of the asset
        required: true
        schema:
          type: string
      - name: X-Executor
        in: header
        description: Identifier of the entity executing the update
        required: true
        schema:
          minLength: 1
          type: string
      requestBody:
        description: The validated JSON payload containing the new values.
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssetManagementRequest"
        required: true
      responses:
        "200":
          description: Asset successfully updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssetManagementResponse"
        "400":
          description: Invalid request payload
        "404":
          description: Asset not found
        "409":
          description: Asset tag or serial number conflict
    delete:
      tags:
      - Asset Management
      summary: Delete an asset
      description: Permanently removes the hardware asset record from the inventory
        database.
      operationId: deleteAsset
      parameters:
      - name: assetHash
        in: path
        description: The unique business hash of the asset
        required: true
        schema:
          type: string
      responses:
        "204":
          description: Asset successfully deleted
        "404":
          description: Asset not found
  /compute:
    post:
      tags:
      - Compute Resource Management
      summary: Register a new hybrid compute resource node
      description: "Logs and provisions a target cloud instance, on-prem VM, or physical\
        \ hardware asset profile."
      operationId: registerComputeNode
      parameters:
      - name: X-Executor
        in: header
        description: Identifier of the administrative engineer cataloging the asset
          node
        required: true
        schema:
          minLength: 1
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ComputeResourceRequest"
        required: true
      responses:
        "201":
          description: Compute resource instance cataloged successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComputeResourceResponse"
        "400":
          description: Invalid payload constraints or unrecognized type configuration
            tokens
  /compute/{resourceHash}:
    get:
      tags:
      - Compute Resource Management
      summary: Retrieve a distinct compute profile configuration
      description: "Fetches complete specifications, active network layout mapping,\
        \ and the latest hardware usage telemetry snapshot."
      operationId: getComputeNodeByHash
      parameters:
      - name: resourceHash
        in: path
        description: The specific infra business key tracking token hash
        required: true
        schema:
          type: string
      responses:
        "200":
          description: Compute node profile located and returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComputeResourceResponse"
        "404":
          description: Target resource tracking hash token not found in cluster storage
  /compute/{resourceHash}/maintenance/end:
    post:
      tags:
      - Compute Resource Management
      summary: Terminate maintenance mode and start verification loop
      description: Closes actual timestamps and returns node to PROVISIONING status
        to await clean agent telemetry synchronization.
      operationId: concludeActiveMaintenance
      parameters:
      - name: resourceHash
        in: path
        required: true
        schema:
          type: string
      - name: X-Executor
        in: header
        required: true
        schema:
          minLength: 1
          type: string
      responses:
        "200":
          description: Asset released from maintenance and routed back to verification
            queues
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComputeResourceResponse"
        "400":
          description: Target asset is not currently flagged under an open maintenance
            loop
        "404":
          description: Target compute resource hash not found
  /compute/{resourceHash}/maintenance/schedule:
    post:
      tags:
      - Compute Resource Management
      summary: Schedule a future maintenance window
      description: "Reserves a timeline block for physical or virtual hardware interventions,\
        \ mapping out expected duration and alarm silences."
      operationId: scheduleMaintenanceBlock
      parameters:
      - name: resourceHash
        in: path
        required: true
        schema:
          type: string
      - name: X-Executor
        in: header
        required: true
        schema:
          minLength: 1
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ComputeResourceService.MaintenanceScheduleCmd"
        required: true
      responses:
        "200":
          description: Maintenance window successfully reserved in inventory timeline
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComputeResourceResponse"
        "400":
          description: Invalid timeline boundaries or date execution logic sequence
            constraints
        "404":
          description: Target compute resource hash not found
  /compute/{resourceHash}/maintenance/start:
    post:
      tags:
      - Compute Resource Management
      summary: Activate maintenance isolation protocol
      description: "Shifts node into MAINTENANCE state, applying hard suppressions\
        \ against monitoring agent ping interference."
      operationId: initiateActiveMaintenance
      parameters:
      - name: resourceHash
        in: path
        required: true
        schema:
          type: string
      - name: X-Executor
        in: header
        required: true
        schema:
          minLength: 1
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ComputeResourceService.MaintenanceStartCmd"
        required: true
      responses:
        "200":
          description: Asset locked and isolated under hard maintenance mode
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComputeResourceResponse"
        "404":
          description: Target compute resource hash not found
  /compute/{resourceHash}/telemetry:
    patch:
      tags:
      - Compute Resource Management
      summary: Ingest remote agent streaming telemetry metrics
      description: "Updates active processing strain load percentages, network throughput,\
        \ and overrides the node operational health status."
      operationId: ingestMetrics
      parameters:
      - name: resourceHash
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ComputeResourceTelemetryRequest"
        required: true
      responses:
        "200":
          description: Telemetry packet successfully processed and counters overridden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComputeResourceResponse"
        "400":
          description: Invalid telemetry counters or parsing failure exception triggered
        "404":
          description: Target resource tracking hash not found to map metrics link
  /licenses:
    post:
      tags:
      - Software License Management
      summary: Register a new software license contract
      description: Purchases and stores a software contract parameter block into inventory
        database bounds.
      operationId: registerLicense
      parameters:
      - name: X-Executor
        in: header
        description: Identifier of the administrative executive executing the contract
          logging
        required: true
        schema:
          minLength: 1
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SoftwareLicenseRequest"
        required: true
      responses:
        "201":
          description: Software license contract successfully cataloged
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SoftwareLicenseResponse"
        "400":
          description: Invalid payload structural attributes or unrecognized enum
            tokens
  /licenses/{licenseHash}:
    get:
      tags:
      - Software License Management
      summary: Retrieve a distinct license configuration
      description: "Fetches comprehensive details, metadata tracking, status nodes,\
        \ and ongoing allocation lists of a contract."
      operationId: getLicenseByHash
      parameters:
      - name: licenseHash
        in: path
        description: The specific corporate license string token identifier hash
        required: true
        schema:
          type: string
      responses:
        "200":
          description: Software license configuration located and returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SoftwareLicenseResponse"
        "404":
          description: Contract hash target parameter not found in cluster storage
  /licenses/{licenseHash}/allocations:
    post:
      tags:
      - Software License Management
      summary: Allocate a single software license seat
      description: Deploys and links a license seat entry record to a corporate user
        profile or hardware workstation machine asset.
      operationId: allocateLicenseSeat
      parameters:
      - name: licenseHash
        in: path
        required: true
        schema:
          type: string
      - name: X-Executor
        in: header
        description: Identifier of the supervisor routing the deployment seat link
        required: true
        schema:
          minLength: 1
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SoftwareLicenseAllocationRequest"
        required: true
      responses:
        "200":
          description: Seat successfully allocated and compliance counters updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SoftwareLicenseResponse"
        "400":
          description: Compliance capacity ceiling bounds depletion or expired status
            restriction exception triggered
        "404":
          description: Target contract reference hash not found
  /maintenance:
    post:
      tags:
      - Maintenance Workflow
      summary: Open a maintenance ticket
      description: Initializes a central tracking record bound against an existing
        inventory hardware asset hash.
      operationId: openTicket
      parameters:
      - name: X-Executor
        in: header
        description: Identifier of the agent dispatching the pipeline action
        required: true
        schema:
          minLength: 1
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MaintenanceTicketRequest"
        required: true
      responses:
        "201":
          description: Ticket successfully opened and cataloged
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MaintenanceTicketResponse"
        "400":
          description: Invalid payload structural attributes
        "404":
          description: Target infrastructure asset hash not found
  /maintenance/{ticketHash}:
    get:
      tags:
      - Maintenance Workflow
      summary: Retrieve a ticket profile
      description: "Fetches complete ongoing details, timeline commentary logs, and\
        \ status scopes of a ticket."
      operationId: getTicketByHash
      parameters:
      - name: ticketHash
        in: path
        description: The specific business token string hash reference
        required: true
        schema:
          type: string
      responses:
        "200":
          description: Maintenance tracking ticket found and returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MaintenanceTicketResponse"
        "404":
          description: Ticket not found matching hash parameter
  /maintenance/{ticketHash}/comments:
    post:
      tags:
      - Maintenance Workflow
      summary: Add a progress comment
      description: Appends a historical immutable textual diagnostic or status notation
        log directly inside the document timeline graph.
      operationId: appendComment
      parameters:
      - name: ticketHash
        in: path
        required: true
        schema:
          type: string
      - name: X-Executor
        in: header
        description: Identifier of the human technician or webhook updating the queue
          trace
        required: true
        schema:
          minLength: 1
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddCommentRequest"
        required: true
      responses:
        "200":
          description: Comment successfully appended into the timeline list document
            graph
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MaintenanceTicketResponse"
        "404":
          description: Ticket target hash parameter reference not found
  /maintenance/{ticketHash}/status:
    patch:
      tags:
      - Maintenance Workflow
      summary: Transition ticket lifecycle state
      description: Alters the internal operational track enum status location nodes
        using strict guardrails checking mechanisms.
      operationId: transitionStatus
      parameters:
      - name: ticketHash
        in: path
        required: true
        schema:
          type: string
      - name: targetStatus
        in: query
        description: The raw target MaintenanceStatus string node token enum
        required: true
        explode: false
        schema:
          type: string
      - name: X-Executor
        in: header
        description: Identifier of the supervisor executing systemic lifecycle override
        required: true
        schema:
          minLength: 1
          type: string
      responses:
        "200":
          description: Status updated and saved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MaintenanceTicketResponse"
        "400":
          description: State validation guard check bounds violation or terminal node
            block lock
  /users:
    get:
      tags:
      - User Management
      summary: List all users
      description: Retrieves all user records from the system.
      operationId: listAll
      responses:
        "200":
          description: listAll 200 response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserManagementResponse"
    post:
      tags:
      - User Management
      summary: Create a new user
      description: Persists a new user record in the system.
      operationId: create
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserManagementRequest"
        required: true
      responses:
        "200":
          description: create 200 response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserManagementResponse"
  /users/search:
    get:
      tags:
      - User Management
      summary: Search for a user
      description: Searches for a user based on multiple optional criteria.
      operationId: search
      parameters:
      - name: companyEmail
        in: query
        required: true
        explode: false
        schema:
          type: string
      - name: personalEmail
        in: query
        required: true
        explode: false
        schema:
          type: string
      - name: login
        in: query
        required: true
        explode: false
        schema:
          type: string
      - name: companyPhone
        in: query
        required: true
        explode: false
        schema:
          type: string
      - name: personalPhone
        in: query
        required: true
        explode: false
        schema:
          type: string
      responses:
        "200":
          description: search 200 response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserManagementResponse"
  /users/{userHash}:
    get:
      tags:
      - User Management
      summary: Find user by hash
      description: Retrieves user details using their unique identifier.
      operationId: getByHash
      parameters:
      - name: userHash
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: getByHash 200 response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserManagementResponse"
    put:
      tags:
      - User Management
      summary: Update an existing user
      description: Modifies user profile details and logs the action centrally.
      operationId: update
      parameters:
      - name: userHash
        in: path
        required: true
        schema:
          type: string
      - name: X-Executor
        in: header
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserManagementRequest"
        required: true
      responses:
        "200":
          description: update 200 response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserManagementResponse"
    delete:
      tags:
      - User Management
      summary: Delete a user
      description: Permanently removes a user record from the system.
      operationId: delete
      parameters:
      - name: userHash
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: delete 200 response
          content:
            application/json:
              schema:
                type: object
  /users/{userHash}/logs:
    get:
      tags:
      - User Management
      summary: Get user audit logs
      description: Retrieves the historical changes for a specific user from the audit
        collection.
      operationId: getAuditLogs
      parameters:
      - name: userHash
        in: path
        description: The unique string hash of the user.
        required: true
        schema:
          type: string
      responses:
        "200":
          description: A list of AuditLogResponse containing all historical changes.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AuditLogResponse"
components:
  schemas:
    AddCommentRequest:
      required:
      - author
      - message
      type: object
      properties:
        author:
          minLength: 1
          type: string
          x-size-message: Comment author cannot be blank
        message:
          minLength: 1
          type: string
          x-size-message: Comment message content text cannot be blank
      description: Inbound payload representing an atomic discursive addition inside
        an active maintenance pipeline.
    AssetManagementRequest:
      required:
      - assetTag
      - equipmentType
      - purchaseValue
      - serialNumber
      - specification
      type: object
      properties:
        assetTag:
          minLength: 1
          type: string
          x-size-message: Asset tag cannot be blank
        serialNumber:
          minLength: 1
          type: string
          x-size-message: Serial number cannot be blank
        equipmentType:
          $ref: "#/components/schemas/EquipmentType"
        status:
          nullable: true
          allOf:
          - $ref: "#/components/schemas/AssetStatus"
        userId:
          type: string
          nullable: true
        purchaseValue:
          minimum: 0
          type: number
          x-minimum-message: Purchase value must be greater than or equal to zero
          x-not-null-message: Purchase value is required
        saleValue:
          minimum: 0
          type: number
          nullable: true
          x-minimum-message: Sale value must be greater than or equal to zero
        acquisitionDate:
          type: string
          format: date-time
          nullable: true
        specification:
          $ref: "#/components/schemas/AssetSpecificationModel"
      description: Data Transfer Object representing the incoming payload to create
        or update a hardware asset. Contains rigorous Jakarta validation rules to
        enforce data compliance at the API edge.
    AssetManagementResponse:
      required:
      - acquisitionDate
      - assetHash
      - assetTag
      - comments
      - equipmentType
      - purchaseValue
      - serialNumber
      - specification
      - status
      type: object
      properties:
        assetHash:
          type: string
        assetTag:
          type: string
        serialNumber:
          type: string
        equipmentType:
          $ref: "#/components/schemas/EquipmentType"
        status:
          $ref: "#/components/schemas/AssetStatus"
        userId:
          type: string
          nullable: true
        purchaseValue:
          type: number
        saleValue:
          type: number
          nullable: true
        acquisitionDate:
          type: string
          format: date-time
        decommissionDate:
          type: string
          format: date-time
          nullable: true
        saleDate:
          type: string
          format: date-time
          nullable: true
        specification:
          $ref: "#/components/schemas/AssetSpecificationModel"
        comments:
          type: array
          items:
            $ref: "#/components/schemas/MaintenanceComment"
      description: Data Transfer Object representing the unified outbound payload
        for asset profiles. Formatted for seamless integration with client-side user
        interfaces and frontend dashboards.
    AssetSpecificationModel:
      type: object
      properties:
        manufacturer:
          type: string
          nullable: true
        model:
          type: string
          nullable: true
        macAddress:
          type: string
          nullable: true
        ipAddress:
          type: string
          nullable: true
        operatingSystem:
          type: string
          nullable: true
      description: Embedded record representing structural hardware specifications
        and networking identities. Directly nested within the asset document inside
        MongoDB.
    AssetStatus:
      type: string
      description: Enumeration representing the granular administrative lifecycle
        states of a corporate hardware asset.
      enum:
      - AVAILABLE
      - ALLOCATED
      - UNDER_MAINTENANCE
      - DECOMMISSIONED
      - SOLD
      x-enum-descriptions:
      - The asset is sitting in inventory and is completely ready to be assigned to
        an employee.
      - The asset has been actively provisioned and is currently in custody of an
        employee.
      - "The device is undergoing physical repairs, hardware upgrades, or configuration\
        \ resets."
      - "The hardware has reached its logical end-of-life, is broken, or was retired\
        \ from active service."
      - The asset was legally sold or liquidated to a third party or employee.
    AuditLogModel.ChangeDetail:
      required:
      - from
      - to
      type: object
      properties:
        from:
          type: string
        to:
          type: string
      description: Represents the transition of a field value.
    AuditLogResponse:
      required:
      - action
      - changes
      - entityHash
      - executedBy
      - logHash
      - timestamp
      type: object
      properties:
        logHash:
          type: string
        entityHash:
          type: string
        action:
          type: string
        changes:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/AuditLogModel.ChangeDetail"
        timestamp:
          type: string
          format: date-time
        executedBy:
          type: string
      description: Data Transfer Object representing an audit log entry in the API
        response.
    ComputeResourceRequest:
      required:
      - externalFqdn
      - gateway
      - internalDnsName
      - macAddress
      - name
      - operatingSystem
      - privateIp
      - provider
      - publicIp
      - ramMemoryMb
      - resourceType
      - spec
      - storageCapacityGb
      - subnetCidr
      - vCpus
      type: object
      properties:
        name:
          minLength: 1
          type: string
          x-size-message: Resource instance descriptive name cannot be blank
        resourceType:
          minLength: 1
          type: string
          x-size-message: Resource virtualization architecture type layer cannot be
            blank
        provider:
          minLength: 1
          type: string
          x-size-message: Infrastructure hosting provider deployment location cannot
            be blank
        vCpus:
          minimum: 0
          exclusiveMinimum: true
          type: integer
          format: int32
          x-minimum-message: vCPUs volume allocation must be greater than zero
          x-not-null-message: Allocated virtual CPU core quantity must be provided
        ramMemoryMb:
          minimum: 0
          exclusiveMinimum: true
          type: integer
          format: int32
          x-minimum-message: RAM memory allocation size in Megabytes must be greater
            than zero
          x-not-null-message: Allocated RAM memory size must be provided
        storageCapacityGb:
          minimum: 0
          exclusiveMinimum: true
          type: integer
          format: int64
          x-minimum-message: Storage capacity allocation in Gigabytes must be greater
            than zero
          x-not-null-message: Persistent storage block volume capacity must be provided
        operatingSystem:
          minLength: 1
          type: string
          x-size-message: Target node operating system or base image template name
            cannot be blank
        privateIp:
          type: string
        publicIp:
          type: string
        subnetCidr:
          type: string
        gateway:
          type: string
        macAddress:
          type: string
        internalDnsName:
          type: string
        externalFqdn:
          type: string
        spec:
          type: object
          additionalProperties:
            type: object
