# Sat Jun 28 10:23:37 UTC 2026
micronaut.application.name=thinklabmanager

# Database Configuration
mongodb.uri=${MONGO_DB_URI}

# Management Endpoints (Health, Liveness, Readiness)
endpoints.health.enabled=true
endpoints.health.sensitive=false
endpoints.health.details-visible=ANONYMOUS

# Exposing Health Checks for Kubernetes or Monitoring tools
endpoints.health.show-details=always

# OpenAPI / Swagger Documentation Configuration
micronaut.router.static.resources.swagger.paths=classpath:META-INF/swagger/**
micronaut.router.static.resources.swagger.mapping=/swagger/**
micronaut.openapi.target.file=swagger.yml

# Swagger UI and Redoc configuration
micronaut.openapi.views.spec=swagger-ui.enabled=true,redoc.enabled=true